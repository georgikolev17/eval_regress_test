name: Agent Eval MVP

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Clone BugsInPy
        run: |
          git clone https://github.com/reproducing-research-projects/BugsInPy.git

      - name: Add BugsInPy tools to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/BugsInPy/framework/bin" >> $GITHUB_PATH

      - name: Show BugsInPy project info
        run: |
          bugsinpy-info -p youtube-dl
      
      - name: Create output directory
        run: |
          mkdir -p workdir
          cd workdir
          mkdir -p youtube-dl
          cd ..
          cd ..

      - name: Checkout buggy project
        run: |
          bugsinpy-checkout -p youtube-dl -i 1 -v 0 -w workdir

      - name: Debug files
        run: |
          ls -la
          ls -la workdir
          ls -la workdir/youtube-dl

      - name: Show bug metadata
        run: |
          find workdir -maxdepth 3 | head -100
