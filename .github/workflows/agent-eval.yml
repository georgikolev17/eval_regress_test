name: Defects4J Triggering-Test Smoke Test

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Defects4J project ID"
        required: true
        default: "Lang"
      bug_id:
        description: "Bug ID"
        required: true
        default: "1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  defects4j-smoke:
    runs-on: ubuntu-latest

    env:
      PROJECT: ${{ inputs.project }}
      BUG_ID: ${{ inputs.bug_id }}
      WORKDIR: ${{ github.workspace }}/workdir

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion cpanminus

      - name: Clone Defects4J
        run: |
          git clone https://github.com/rjust/defects4j.git

      - name: Install Defects4J Perl deps
        run: |
          cd defects4j
          sudo cpanm --installdeps .

      - name: Initialize Defects4J
        run: |
          cd defects4j
          ./init.sh

      - name: Add Defects4J CLI to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/defects4j/framework/bin" >> "$GITHUB_PATH"

      - name: Show bug info
        run: |
          defects4j info -p "$PROJECT" -b "$BUG_ID"

      - name: Checkout buggy version
        run: |
          mkdir -p "$WORKDIR"
          defects4j checkout -p "$PROJECT" -v "${BUG_ID}b" -w "$WORKDIR"

      - name: Compile buggy version
        run: |
          set +e
          defects4j compile -w "$WORKDIR" 2>&1 | tee "$GITHUB_WORKSPACE/compile.log"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "COMPILE_EXIT_CODE=$EXIT_CODE" >> "$GITHUB_ENV"
          echo "Compile exit code: $EXIT_CODE"
          test $EXIT_CODE -eq 0

      - name: Export triggering tests
        run: |
          defects4j export -p tests.trigger -w "$WORKDIR" -o "$GITHUB_WORKSPACE/trigger_tests.txt"
          echo "Triggering tests:"
          cat "$GITHUB_WORKSPACE/trigger_tests.txt"

      - name: Run first triggering test and assert failure
        run: |
          FIRST_TEST=$(head -n 1 "$GITHUB_WORKSPACE/trigger_tests.txt")
          echo "FIRST_TRIGGER_TEST=$FIRST_TEST" >> "$GITHUB_ENV"
          echo "Running: $FIRST_TEST"

          set +e
          defects4j test -w "$WORKDIR" -t "$FIRST_TEST" 2>&1 | tee "$GITHUB_WORKSPACE/test.log"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "TEST_EXIT_CODE=$EXIT_CODE" >> "$GITHUB_ENV"
          echo "Test exit code: $EXIT_CODE"

          # Buggy version should fail this triggering test
          test $EXIT_CODE -ne 0

      - name: Show summary
        if: always()
        run: |
          {
            echo "## Defects4J smoke test"
            echo ""
            echo "- Project: $PROJECT"
            echo "- Bug ID: $BUG_ID"
            echo "- Checked out version: ${BUG_ID}b"
            echo "- Compile exit code: ${COMPILE_EXIT_CODE:-not-set}"
            echo "- Triggering test: ${FIRST_TRIGGER_TEST:-not-set}"
            echo "- Trigger test exit code: ${TEST_EXIT_CODE:-not-set}"
            echo ""
            echo "### Trigger tests"
            echo '```'
            cat "$GITHUB_WORKSPACE/trigger_tests.txt" || true
            echo '```'
            echo ""
            echo "### Last lines of compile.log"
            echo '```'
            tail -n 40 "$GITHUB_WORKSPACE/compile.log" || true
            echo '```'
            echo ""
            echo "### Last lines of test.log"
            echo '```'
            tail -n 40 "$GITHUB_WORKSPACE/test.log" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: defects4j-logs
          path: |
            ${{ github.workspace }}/compile.log
            ${{ github.workspace }}/test.log
            ${{ github.workspace }}/trigger_tests.txt
