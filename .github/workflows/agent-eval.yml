name: BugsInPy Smoke Test

on:
  workflow_dispatch:
    inputs:
      project:
        description: "BugsInPy project name"
        required: true
        default: "youtube-dl"
      bug_id:
        description: "Bug ID"
        required: true
        default: "2"
      version_id:
        description: "0 = buggy, 1 = fixed"
        required: true
        default: "0"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bugsinpy-smoke:
    runs-on: ubuntu-latest

    env:
      PROJECT: ${{ inputs.project }}
      BUG_ID: ${{ inputs.bug_id }}
      VERSION_ID: ${{ inputs.version_id }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Clone BugsInPy
        run: |
          git clone https://github.com/reproducing-research-projects/BugsInPy.git

      - name: Add BugsInPy CLI to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/BugsInPy/framework/bin" >> "$GITHUB_PATH"

      - name: Create checkout directory
        run: |
          mkdir -p workdir

      - name: Show project info
        run: |
          bugsinpy-info -p "$PROJECT"

      - name: Checkout requested bug version
        run: |
          bugsinpy-checkout -p "$PROJECT" -i "$BUG_ID" -v "$VERSION_ID" -w "$GITHUB_WORKSPACE/workdir"

      - name: Verify checkout exists
        run: |
          test -d "workdir/$PROJECT"
          test -f "workdir/$PROJECT/bugsinpy_bug.info"
          echo "Checkout OK: workdir/$PROJECT"

      - name: Show checked out files
        run: |
          ls -la workdir
          ls -la "workdir/$PROJECT"
          find "workdir/$PROJECT" -maxdepth 2 -type f | head -100

      - name: Workflow summary
        run: |
          {
            echo "## BugsInPy smoke test"
            echo ""
            echo "- Project: $PROJECT"
            echo "- Bug ID: $BUG_ID"
            echo "- Version: $VERSION_ID"
            echo "- Checked out path: workdir/$PROJECT"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true 
          
      - name: Create bug conda env
        run: |
          conda create -n ce4643cfe50c63d63380c1ef67ea5299 -y python=3.7.0

      - name: Make Conda visible at /opt/conda
        run: |
          CONDA_BASE=$(conda info --base)
          echo "Real conda base: $CONDA_BASE"
          sudo rm -rf /opt/conda || true
          sudo ln -s "$CONDA_BASE" /opt/conda
          ls -la /opt/conda/etc/profile.d/conda.sh
          
      - name: Compile checked out project
        run: |
          cd "$GITHUB_WORKSPACE/workdir/$PROJECT"
          set +e
          bugsinpy-compile 2>&1 | tee "$GITHUB_WORKSPACE/compile.log"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "COMPILE_EXIT_CODE=$EXIT_CODE" >> "$GITHUB_ENV"
          echo "Compile exit code: $EXIT_CODE"
          test $EXIT_CODE -eq 0

      - name: Run bug-relevant tests
        run: |
          cd "$GITHUB_WORKSPACE/workdir/$PROJECT"
          set +e
          bugsinpy-test 2>&1 | tee "$GITHUB_WORKSPACE/test.log"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "TEST_EXIT_CODE=$EXIT_CODE" >> "$GITHUB_ENV"
          echo "Test exit code: $EXIT_CODE"
          test $EXIT_CODE -ne 0

      - name: Show result summary
        if: always()
        run: |
          echo "Compile exit code: $COMPILE_EXIT_CODE"
          echo "Test exit code: $TEST_EXIT_CODE"
          {
            echo "## BugsInPy test result"
            echo ""
            echo "- Project: $PROJECT"
            echo "- Bug ID: $BUG_ID"
            echo "- Version: $VERSION_ID"
            echo "- Compile exit code: $COMPILE_EXIT_CODE"
            echo "- Test exit code: $TEST_EXIT_CODE"
            echo ""
            echo "### Last lines of test output"
            echo '```'
            tail -n 40 "$GITHUB_WORKSPACE/test.log" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bugsinpy-logs
          path: |
            ${{ github.workspace }}/compile.log
            ${{ github.workspace }}/test.log
