# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Debug models access in this exact run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "repo=${{ github.repository }}"
          echo "event=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "fork=${{ github.event.pull_request.head.repo.fork || false }}"
      
          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://models.github.ai/catalog/models" > models.json
      
          python - <<'PY'
          import json
          m=json.load(open("models.json","r",encoding="utf-8"))
          ids=[x.get("id") for x in m if isinstance(x,dict)]
          print("catalog_has_gpt41=", "openai/gpt-4.1" in ids)
          print("count=", len(ids))
          PY
      
          cat > body.json <<'JSON'
          {"model":"openai/gpt-4.1-mini","messages":[{"role":"user","content":"OK"}],"temperature":0}
          JSON
      
          code=$(curl -sS -X POST -o resp.json -w "%{http_code}" \
            "https://models.github.ai/inference/chat/completions?api-version=2026-03-10" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -d @body.json)
          echo "mini_status=$code"
          cat resp.json
