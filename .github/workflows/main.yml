# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Probe GitHub Models endpoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO_DEMO: If your org requires org-attributed usage, use:
          # GH_MODELS_URL: https://models.github.ai/orgs/<ORG>/inference/chat/completions
          GH_MODELS_URL: https://models.github.ai/inference/chat/completions
        run: |
          set -euo pipefail
          mkdir -p artifacts
      
          cat > artifacts/body.json <<'JSON'
          {
            "model": "openai/gpt-4.1",
            "messages": [
              { "role": "user", "content": "Reply with exactly OK" }
            ],
            "temperature": 0
          }
          JSON
      
          status=$(curl -sS -X POST \
            -o artifacts/response.json \
            -w "%{http_code}" \
            "$GH_MODELS_URL?api-version=2026-03-10" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -d @artifacts/body.json)
      
          echo "HTTP status: $status"
          cat artifacts/response.json
      
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Probe failed with HTTP $status"
            exit 1
          fi
