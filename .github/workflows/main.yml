# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Debug allowed models
        run: |
          curl -sS \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://models.github.ai/catalog/models" > models.json
      
          python - <<'PY'
          import json
          data = json.load(open("models.json", "r", encoding="utf-8"))
          ids = [m.get("id") for m in data if isinstance(m, dict)]
          print(f"models returned: {len(ids)}")
          print("contains openai/gpt-4.1:", "openai/gpt-4.1" in ids)
          print("sample:", ids[:20])
          PY
