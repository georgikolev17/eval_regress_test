name: Use GitHub Models

on: [push]

permissions:
  models: read

jobs:
  call-model:
    runs-on: ubuntu-latest
    steps:
      - name: Call AI model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response = $(curl "https://models.github.ai/inference/chat/completions" \
             -H "Content-Type: application/json" \
             -H "Authorization: Bearer $GITHUB_TOKEN" \
             -d '{
              "messages": [
                  {
                     "role": "user",
                     "content": "Reply with ok."
                  }
               ],
               "model": "openai/gpt-4o"
            }')
          echo "Raw response:"
          echo "$response"

          echo "Model text:"
          python -c "import json,sys; print(json.loads(sys.argv[1])['choices'][0]['message']['content'])" "$response"
